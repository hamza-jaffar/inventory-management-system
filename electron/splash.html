<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initializing Inventory Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            cursor: default;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: transparent;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Master Container */
        .splash-card {
            width: 640px;
            height: 400px;
            background: #090d16;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.15);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* 60fps Interactive Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Ambient Glow Orbs */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #6366f1;
            top: -100px;
            right: -100px;
            animation: floatOrb 8s infinite alternate ease-in-out;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: #a855f7;
            bottom: -50px;
            left: 100px;
            animation: floatOrb 10s infinite alternate-reverse ease-in-out;
        }
        
        /* Interactive Mouse Spotlight Glow */
        .cursor-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, rgba(168, 85, 247, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            left: -300px;
            top: -300px;
            z-index: 1;
            transition: opacity 0.3s;
        }

        /* Split Panels */
        .left-panel {
            flex: 1.3;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 3;
            background: linear-gradient(90deg, rgba(9, 13, 22, 0.95) 0%, rgba(9, 13, 22, 0.7) 100%);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .right-panel {
            flex: 0.9;
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.2) 0%, rgba(9, 13, 22, 0.9) 100%);
            overflow: hidden;
        }

        /* Branding Styles */
        .app-tag {
            font-size: 0.65rem;
            font-weight: 800;
            color: #818cf8;
            letter-spacing: 0.25em;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }
        
        .branding h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .accent-text {
            background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Elegant Abstract Mini-Logo */
        .logo-wrapper {
            width: 44px;
            height: 44px;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .logo-icon-svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #a5b4fc;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Progress & Status area */
        .status-container {
            margin-top: auto;
            margin-bottom: 1.5rem;
        }
        
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 0.6rem;
        }
        
        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: #94a3b8;
            transition: all 0.3s;
        }
        
        .percentage {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #c084fc;
        }
        
        .progress-bar {
            height: 5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: width 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        
        .sub-status {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Footer Credits */
        .footer-credits {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 0.8rem;
        }
        
        .version {
            font-size: 0.7rem;
            color: #475569;
            font-weight: 600;
        }
        
        .copyright {
            font-size: 0.65rem;
            color: #475569;
        }

        /* Right Panel: Kinetic Geometric Motion Art */
        .visual-art {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .art-backdrop {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(99, 102, 241, 0) 70%);
            filter: blur(10px);
        }

        .kinetic-sculpture {
            position: relative;
            width: 140px;
            height: 140px;
            transform-style: preserve-3d;
            perspective: 800px;
            animation: globalRotate 25s linear infinite;
        }
        
        .sculpture-ring {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px dashed rgba(165, 180, 252, 0.35);
            transform-style: preserve-3d;
        }
        
        .ring-1 {
            transform: rotateX(45deg) rotateY(45deg);
            border-color: rgba(99, 102, 241, 0.5);
            animation: orbit1 15s linear infinite;
        }
        .ring-2 {
            transform: rotateX(115deg) rotateY(30deg);
            border-color: rgba(168, 85, 247, 0.5);
            border-style: solid;
            border-width: 1px;
            animation: orbit2 20s linear infinite;
        }
        .ring-3 {
            transform: rotateX(60deg) rotateY(120deg);
            border-color: rgba(236, 72, 153, 0.4);
            border-style: dotted;
            border-width: 3px;
            animation: orbit3 12s linear infinite;
        }

        .core-sphere {
            position: absolute;
            width: 36px;
            height: 36px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #818cf8 30%, #4c1d95 80%, #000000 100%);
            border-radius: 50%;
            top: calc(50% - 18px);
            left: calc(50% - 18px);
            box-shadow: 0 0 35px rgba(99, 102, 241, 0.8),
                        inset 0 -2px 10px rgba(0, 0, 0, 0.8);
            animation: corePulse 3s ease-in-out infinite alternate;
        }

        /* Animations */
        @keyframes floatOrb {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }
        
        @keyframes globalRotate {
            0% { transform: rotate3d(1, 1, 1, 0deg); }
            100% { transform: rotate3d(1, 1, 1, 360deg); }
        }
        
        @keyframes orbit1 {
            0% { transform: rotateX(45deg) rotateY(45deg) rotateZ(0deg); }
            100% { transform: rotateX(45deg) rotateY(45deg) rotateZ(360deg); }
        }
        @keyframes orbit2 {
            0% { transform: rotateX(115deg) rotateY(30deg) rotateZ(360deg); }
            100% { transform: rotateX(115deg) rotateY(30deg) rotateZ(0deg); }
        }
        @keyframes orbit3 {
            0% { transform: rotateX(60deg) rotateY(120deg) rotateZ(0deg); }
            100% { transform: rotateX(60deg) rotateY(120deg) rotateZ(360deg); }
        }
        @keyframes corePulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(99, 102, 241, 0.7); }
            100% { transform: scale(1.15); box-shadow: 0 0 50px rgba(168, 85, 247, 0.9); }
        }
    </style>
</head>
<body>
    <div class="splash-card" id="splashCard">
        <!-- Interactive Canvas for fluid sparkles -->
        <canvas id="particleCanvas"></canvas>
        
        <!-- Ambient orbs -->
        <div class="ambient-glow orb-1"></div>
        <div class="ambient-glow orb-2"></div>
        
        <!-- Mouse Spotlight Spotlight Glow -->
        <div class="cursor-glow" id="cursorGlow"></div>
        
        <!-- Left Side Layout -->
        <div class="left-panel">
            <div class="branding">
                <div class="logo-wrapper">
                    <svg class="logo-icon-svg" viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="app-tag">ENTERPRISE OS</div>
                    <h1>INVENTORY <span class="accent-text">MANAGER</span></h1>
                </div>
            </div>
            
            <div class="status-container">
                <div class="status-header">
                    <span class="status-text" id="statusMessage">Starting up environment...</span>
                    <span class="percentage" id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="sub-status" id="subStatus">Loading configurations...</div>
            </div>
            
            <div class="footer-credits">
                <div class="version">Version 1.0.0 Stable</div>
                <div class="copyright">© 2026 Inventory Manager by Degvora</div>
            </div>
        </div>
        
        <!-- Right Side Kinetic Graphic -->
        <div class="right-panel">
            <div class="visual-art">
                <div class="art-backdrop"></div>
                <div class="kinetic-sculpture">
                    <div class="sculpture-ring ring-1"></div>
                    <div class="sculpture-ring ring-2"></div>
                    <div class="sculpture-ring ring-3"></div>
                    <div class="core-sphere"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Interactive Mouse Spotlight Glow ---
        const splashCard = document.getElementById('splashCard');
        const cursorGlow = document.getElementById('cursorGlow');
        
        splashCard.addEventListener('mousemove', (e) => {
            const rect = splashCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            cursorGlow.style.opacity = '1';
            cursorGlow.style.left = `${x}px`;
            cursorGlow.style.top = `${y}px`;
        });
        
        splashCard.addEventListener('mouseleave', () => {
            cursorGlow.style.opacity = '0';
        });

        // --- 2. Interactive Canvas Particles & Sparks System ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = splashCard.clientWidth;
        let height = canvas.height = splashCard.clientHeight;
        
        // Handle resizing dynamically if window gets updated
        window.addEventListener('resize', () => {
            width = canvas.width = splashCard.clientWidth;
            height = canvas.height = splashCard.clientHeight;
        });

        // Particle configuration
        const ambientParticles = [];
        const activeSparks = [];
        const maxAmbient = 40;
        
        const mouse = { x: -1000, y: -1000, inside: false };
        
        splashCard.addEventListener('mousemove', (e) => {
            const rect = splashCard.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            mouse.inside = true;
            
            // Spawn 2 hover sparks on mouse move for interactive trails
            if (Math.random() < 0.4) {
                spawnSpark(mouse.x, mouse.y, 1.2, '#a5b4fc');
            }
            if (Math.random() < 0.2) {
                spawnSpark(mouse.x, mouse.y, 1.2, '#c084fc');
            }
        });
        
        splashCard.addEventListener('mouseleave', () => {
            mouse.inside = false;
        });
        
        // Burst of particles on click!
        splashCard.addEventListener('mousedown', (e) => {
            const rect = splashCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Spawn 20 burst particles
            const colors = ['#6366f1', '#a855f7', '#ec4899', '#38bdf8', '#ffffff'];
            for (let i = 0; i < 22; i++) {
                spawnSpark(x, y, 4, colors[Math.floor(Math.random() * colors.length)]);
            }
        });

        class AmbientParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height + height; // Start below bottom
                this.vy = -(0.2 + Math.random() * 0.5);
                this.vx = (Math.random() - 0.5) * 0.3;
                this.size = 0.8 + Math.random() * 1.5;
                this.alpha = 0.1 + Math.random() * 0.6;
                this.color = Math.random() < 0.5 ? '#818cf8' : '#c084fc';
            }
            update() {
                this.y += this.vy;
                this.x += this.vx;
                
                // Cursor attraction!
                if (mouse.inside) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        this.x += (dx / dist) * 0.5;
                        this.y += (dy / dist) * 0.5;
                    }
                }
                
                if (this.y < -10 || this.x < -10 || this.x > width + 10) {
                    this.reset();
                    this.y = height + 10;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class SparkParticle {
            constructor(x, y, force, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * force;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 0.2; // slight upward draft
                this.size = 1 + Math.random() * 2;
                this.alpha = 1.0;
                this.decay = 0.015 + Math.random() * 0.02;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.size = Math.max(0.1, this.size - 0.02);
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnSpark(x, y, force, color) {
            activeSparks.push(new SparkParticle(x, y, force, color));
        }

        // Initialize ambient particles
        for (let i = 0; i < maxAmbient; i++) {
            ambientParticles.push(new AmbientParticle());
        }

        // Main 60fps Loop
        function loop() {
            ctx.clearRect(0, 0, width, height);
            
            // Render and update ambient floating particles
            ambientParticles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Render and update interactive sparks
            for (let i = activeSparks.length - 1; i >= 0; i--) {
                const s = activeSparks[i];
                s.update();
                if (s.alpha <= 0) {
                    activeSparks.splice(i, 1);
                } else {
                    s.draw();
                }
            }
            
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // --- 3. Dynamic Progress and Elegant Custom System status ---
        const statusMessage = document.getElementById('statusMessage');
        const subStatus = document.getElementById('subStatus');
        const progressPercentage = document.getElementById('progressPercentage');
        const progressFill = document.getElementById('progressFill');

        // Dynamic, high-fidelity loading scripts that resemble Adobe CC sequence
        const bootSteps = [
            { pct: 5, msg: "Initializing local desktop shell...", sub: "Setting process sandbox bindings..." },
            { pct: 15, msg: "Configuring offline runtime SAPI...", sub: "Loading PHP internal configuration..." },
            { pct: 28, msg: "Loading system library hooks...", sub: "Enabling extension fileinfo, gd, zip, curl..." },
            { pct: 40, msg: "Verifying secure persistent DB...", sub: "Querying SQLite driver at AppData/..." },
            { pct: 52, msg: "Running relational migrations...", sub: "Checking schema integrity benchmarks..." },
            { pct: 67, msg: "Starting secure background threads...", sub: "Discovering open system ports dynamically..." },
            { pct: 80, msg: "Binding local application servers...", sub: "Listening at 127.0.0.1 HTTP socket..." },
            { pct: 92, msg: "Caching system permission states...", sub: "Preloading Spatie security credentials..." },
            { pct: 99, msg: "Launching rich system interface...", sub: "Rendering Inertia layout nodes..." }
        ];

        let currentStepIndex = 0;
        let progress = 0;
        
        function updateProgress() {
            if (progress < 100) {
                // Determine step increments
                const currentStepObj = bootSteps[currentStepIndex];
                
                // Slow down at different parts to look extremely realistic
                let increment = 0.5 + Math.random() * 1.5;
                if (progress >= 95) {
                    increment = 0.05; // hover near complete until main process kills the splash
                }
                
                progress = Math.min(99.9, progress + increment);
                
                // Match the steps as we cross their thresholds
                if (currentStepIndex < bootSteps.length - 1 && progress >= bootSteps[currentStepIndex + 1].pct) {
                    currentStepIndex++;
                }
                
                const step = bootSteps[currentStepIndex];
                statusMessage.textContent = step.msg;
                subStatus.textContent = step.sub;
                
                // Render progress bar changes
                const percentText = Math.floor(progress);
                progressPercentage.textContent = `${percentText}%`;
                progressFill.style.width = `${progress}%`;
                
                // Micro spark emits when entering new steps
                if (Math.random() < 0.1) {
                    spawnSpark(width * 0.7 + Math.random() * 80, height * 0.5, 2, '#c084fc');
                }
                
                setTimeout(updateProgress, 60 + Math.random() * 50);
            }
        }
        
        // Start simulated smooth boot sequence
        setTimeout(updateProgress, 200);

    </script>
</body>
</html>
