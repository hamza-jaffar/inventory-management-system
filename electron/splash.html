<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initializing Inventory Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 24px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-area {
            position: relative;
            margin-bottom: 2rem;
            display: inline-block;
        }
        .logo-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: #6366f1;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .logo-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #6366f1;
            font-weight: bold;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .progress-bar {
            height: 4px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 9999px;
            animation: indeterminate 2s infinite linear;
            transform-origin: 0% 50%;
        }
        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes indeterminate {
            0% {
                transform: translateX(0) scaleX(0.1);
            }
            40% {
                transform: translateX(0) scaleX(0.4);
            }
            100% {
                transform: translateX(100%) scaleX(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <div class="logo-ring"></div>
            <div class="logo-icon">IM</div>
        </div>
        <h1>Inventory Manager</h1>
        <p>Loading application and local services...</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="status-text" id="status">Starting Database</div>
    </div>

    <script>
        const statuses = [
            "Setting up local environment...",
            "Starting secure database...",
            "Checking migrations...",
            "Launching backend process...",
            "Configuring offline storage..."
        ];
        let index = 0;
        const statusEl = document.getElementById('status');
        setInterval(() => {
            index = (index + 1) % statuses.length;
            statusEl.textContent = statuses[index];
        }, 1500);
    </script>
</body>
</html>
